name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  # ========================================
  # Backend CI
  # ========================================
  backend-ci:
    name: Backend — Test & Lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: interview_platform_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Initialize test database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d interview_platform_test -f ../database/schema.sql

      - name: Run tests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: interview_platform_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_SSL: "false"
          JWT_SECRET: test-jwt-secret-32-chars-minimum
          JWT_REFRESH_SECRET: test-refresh-secret-32-chars
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm test -- --passWithNoTests

      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage/lcov.info
          flags: backend
        if: always()

  # ========================================
  # Frontend CI
  # ========================================
  frontend-ci:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build frontend
        env:
          VITE_API_URL: https://api.workforme.space
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_SOCKET_URL: wss://api.workforme.space
          VITE_APP_NAME: InterviewAI
          VITE_ENV: production
        run: npm run build

      - name: Check build size
        run: |
          du -sh dist/
          ls -la dist/assets/ | head -20

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  # ========================================
  # Docker Build Validation
  # ========================================
  docker-build:
    name: Docker — Validate Build
    runs-on: ubuntu-latest
    needs: [backend-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: interviewai-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker container health
        run: |
          docker run -d --name test-api \
            -e NODE_ENV=test \
            -e PORT=5000 \
            -e DB_HOST=localhost \
            -e DB_NAME=test \
            -e DB_USER=test \
            -e DB_PASSWORD=test \
            -e JWT_SECRET=test-secret-32-chars-minimum \
            interviewai-backend:ci-${{ github.sha }}
          sleep 5
          docker ps -a
