# =============================================================
# AWS CodeDeploy AppSpec
# Deploys backend Docker container to EC2
# =============================================================

version: 0.0
os: linux

files:
  - source: /
    destination: /home/ec2-user/app

hooks:
  BeforeInstall:
    - location: aws/scripts/before_install.sh
      timeout: 120
      runas: root

  AfterInstall:
    - location: aws/scripts/after_install.sh
      timeout: 300
      runas: ec2-user

  ApplicationStart:
    - location: aws/scripts/start_server.sh
      timeout: 120
      runas: ec2-user

  ApplicationStop:
    - location: aws/scripts/stop_server.sh
      timeout: 60
      runas: ec2-user

  ValidateService:
    - location: aws/scripts/validate_service.sh
      timeout: 60
      runas: ec2-user
