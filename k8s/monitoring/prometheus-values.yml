# Prometheus custom values for kube-prometheus-stack
# Install: helm install monitoring prometheus-community/kube-prometheus-stack \
#   -f k8s/monitoring/prometheus-values.yml --namespace monitoring

grafana:
  enabled: true
  adminPassword: "InterviewAI@Grafana2024"   # change this!

  service:
    type: LoadBalancer     # exposes Grafana publicly

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249          # Kubernetes Cluster Overview
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860          # Node Exporter Full
        revision: 31
        datasource: Prometheus
      pod-metrics:
        gnetId: 6417          # Kubernetes Pods
        revision: 1
        datasource: Prometheus

prometheus:
  enabled: true

  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    # Scrape interviewai namespace too
    additionalScrapeConfigs:
      - job_name: 'interviewai-backend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - interviewai
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

alertmanager:
  enabled: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
