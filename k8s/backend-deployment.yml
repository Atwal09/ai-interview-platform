apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: interviewai
  labels:
    app: backend
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # zero-downtime deployments
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/api/metrics"
    spec:
      containers:
        - name: backend
          image: ECR_BACKEND_IMAGE          # replaced by Jenkinsfile
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http

          # Load all secrets as environment variables
          envFrom:
            - secretRef:
                name: backend-secrets

          # Health checks
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          # Resource limits
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      restartPolicy: Always
