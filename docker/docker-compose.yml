# =============================================================
# Docker Compose — Local Development
# AI Mock Interview Platform
# =============================================================

version: '3.9'

services:
  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    container_name: interview_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: interview_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d interview_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ---- Redis (for caching & sessions) ----
  redis:
    image: redis:7-alpine
    container_name: interview_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis_dev_password
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ---- Backend API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: interview_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: interview_platform
      DB_USER: postgres
      DB_PASSWORD: postgres_dev_password
      DB_SSL: "false"
      REDIS_URL: redis://:redis_dev_password@redis:6379
      FRONTEND_URL: http://localhost:3000
      # Add your keys in .env file
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src          # Hot reload in dev
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app_network

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:1.25-alpine
    container_name: interview_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      # SSL certs for production (mount via Let's Encrypt / ACM)
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_logs:
  nginx_logs:

networks:
  app_network:
    driver: bridge
